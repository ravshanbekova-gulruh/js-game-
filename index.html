<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>JS Game</title>
  </head>
  <body>
    <div class="fireworks">
      <div class="content">
      <h2 class="content__title">Rock Paper Scissors</h2>

      <div class="wrapper">
        <div class="wrapper__content">
          <img class="first_player" src="./img/paper.png" alt="" />
          <span>1-player</span>
        </div>
        <div class="wrapper__content">
          <img class="second_player" src="./img/paper.png" alt="" />
          <span>2-player</span>
        </div>
      </div>
      <button class="btn">Start</button>
      <p class="result">You won!</p>
    </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
